version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: audit-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - audit-network

  mongodb:
    image: mongo:7
    container_name: audit-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: audit_db
    volumes:
      - mongo-data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - audit-network

  audit-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: audit-service
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/audit_db?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
      - mongodb
    volumes:
      - ./src:/app/src
      - ./node_modules:/app/node_modules
    networks:
      - audit-network
    command: npm run start:dev

volumes:
  redis-data:
  mongo-data:

networks:
  audit-network:
    driver: bridge